server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123321
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON澶勭悊鏃跺拷鐣ラ潪绌哄瓧娈?
mybatis-plus:
  type-aliases-package: com.hmdp.entity;com.campus.entity # 鍒悕鎵弿鍖?
logging:
  level:
    com.hmdp: debug
  pattern:
    dateformat: mm:ss.SSS

# 校园二手交易平台自定义配置
market:
  audit:
    enabled: false
